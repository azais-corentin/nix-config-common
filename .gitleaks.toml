# Gitleaks configuration for the shared nix-config-common repository

title = "nix-config-common gitleaks rules"

# Scan with gitleaks' built-in default ruleset. Without this a custom config
# ships zero rules and detects nothing. Repo-specific allowlist entries (e.g.
# commit hashes for known false positives like public keys or widget IDs) get
# layered on top in an [allowlist] block as they are found.
[extend]
useDefault = true
